<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">chromonym minimal bauhaus-inspired banner</title>
  <desc id="desc">Minimal transparent SVG banner for chromonym showing simplified color formats converging into a canonical color square.</desc>

  <defs>
    <linearGradient id="gradMain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF5A36"/>
      <stop offset="100%" stop-color="#D91C5C"/>
    </linearGradient>
    <linearGradient id="gradAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <style>
      .ink { fill: #111111; }
      .line { stroke: #111111; stroke-width: 2.5; stroke-linecap: square; }
      .label { fill: #111111; font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; font-size: 24px; letter-spacing: 0.08em; }
      .wordmark { fill: #111111; font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; font-size: 64px; font-weight: 600; letter-spacing: -0.03em; }
      .sub { fill: #444444; font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; font-size: 22px; letter-spacing: 0.01em; }
    </style>
  </defs>

  <!-- Left-side diagram -->
  <g transform="translate(84 70)">
    <!-- input labels -->
    <text x="0" y="42" class="label">#FF0000</text>
    <text x="0" y="166" class="label">RGB</text>
    <text x="0" y="290" class="label">185C</text>

    <!-- guide lines -->
    <line x1="160" y1="34" x2="322" y2="34" class="line"/>
    <line x1="160" y1="158" x2="286" y2="158" class="line"/>
    <line x1="160" y1="282" x2="322" y2="282" class="line"/>

    <!-- vertical join -->
    <line x1="322" y1="34" x2="322" y2="282" class="line"/>
    <line x1="322" y1="158" x2="438" y2="158" class="line"/>

    <!-- canonical mark -->
    <rect x="438" y="104" width="108" height="108" fill="url(#gradMain)"/>
    <rect x="466" y="132" width="52" height="52" fill="url(#gradAccent)"/>
  </g>

  <!-- Right-side text -->
  <g transform="translate(760 126)">
    <text x="0" y="0" class="wordmark">chromonym</text>
    <text x="0" y="56" class="sub">identify, resolve, convert</text>
  </g>
</svg>
