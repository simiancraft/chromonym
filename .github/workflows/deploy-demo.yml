name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
    # Only rebuild the demo when things that could affect it change.
    paths:
      - 'demo/**'
      - 'src/**'
      - '.github/assets/**'
      - 'package.json'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

# Required for actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time.
concurrency:
  group: deploy-demo
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.0.1
        with:
          bun-version: '1.1.34'

      - name: Install (root — needed to build chromonym dist)
        run: bun install --frozen-lockfile

      - name: Build chromonym (demo imports from dist)
        run: bun run build

      - name: Install (demo)
        working-directory: ./demo
        run: bun install --no-frozen-lockfile

      - name: Build demo
        working-directory: ./demo
        env:
          GITHUB_PAGES: 'true'
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: ./demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
